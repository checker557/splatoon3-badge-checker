<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Splatoon3 Badge Checker</title>
<style>
body { font-family: sans-serif; background:#f2f2f2; padding:20px; }
.badge { margin: 8px 0; }
.progress { margin-top:20px; font-weight:bold; }
</style>
</head>
<body>

<h1>Splatoon3 バッジチェッカー</h1>
<p>※進捗はあなたの端末にのみ保存されます。他人には共有されません。</p>

<div id="badges"></div>
<div class="progress" id="progress"></div>

<script>
const badgeData =[ `
ショップバッジ
ブキチバッジ（ノーマル）　10コのブキのじゅくれん度が★４以上になった
ブキチバッジ（銀）　25コのブキのじゅくれん度が★４以上になった
ブキチバッジ（金）　50コのブキのじゅくれん度が★４以上になった
エチゼン　ハイカラシティのフク屋でおカネを100,000ゲソ使った
エチゼン(金)　ハイカラシティのフク屋でおカネを1,000,000ゲソ使った
アネモ　ハイカラシティのアタマ屋でおカネを100,000ゲソ使った
アネモ(金)　ハイカラシティのアタマ屋でおカネを1,000,000ゲソ使った
アジオ　ハイカラシティのクツ屋でおカネを100,000ゲソ使った
アジオ(金)　ハイカラシティのクツ屋でおカネを1,000,000ゲソ使った
ビゼン　ハイカラスクエアのフク屋でおカネを100,000ゲソ使った
ビゼン(金)　ハイカラスクエアのフク屋でおカネを1,000,000ゲソ使った
ミウラ　ハイカラスクエアのアタマ屋でおカネを100,000ゲソ使った
ミウラ(金)　ハイカラスクエアのアタマ屋でおカネを1,000,000ゲソ使った
シガニー　ハイカラスクエアのクツ屋でおカネを100,000ゲソ使った
シガニー(金)　ハイカラスクエアのクツ屋でおカネを1,000,000ゲソ使った
オームラ　バンカラ街のアタマ屋でお金を100,000ゲソ使った
オームラ(金)　バンカラ街のアタマ屋でお金を1,000,000ゲソ使った
ハナガサ　バンカラ街のフク屋でお金を100,000ゲソ使った
ハナガサ(金)　バンカラ街のフク屋でお金を1,000,000ゲソ使った
ヤシガニさん　バンカラ街のクツ屋でお金を100,000ゲソ使った
ヤシガニさん(金)　バンカラ街のクツ屋でお金を1,000,000ゲソ使った
パル子　ザッカ屋でおカネを100,000ゲソ使った
パル子(金)　ザッカ屋でおカネを1,000,000ゲソ使った
スパイキー　スパイキーに10回ギアを注文した
スパイキー(金)　スパイキーに100回ギアを注文した
ダウニー　ダウニーに10回ギアを注文した
ダウニー(金)　ダウニーに100回ギアを注文した
店員　売店で10回注文した
店員(銀)　売店で100回注文した
店員(金)　売店で1000回注文した
`;]

const container = document.getElementById("badges");
const progress = document.getElementById("progress");

function updateProgress() {
  const total = badgeList.length;
  let checked = 0;
  badgeList.forEach((_, i) => {
    if(localStorage.getItem("badge-"+i) === "true") checked++;
  });
  progress.textContent = `達成率：${checked} / ${total} (${Math.round((checked/total)*100)}%)`;
}

badgeList.forEach((badge, index) => {
  const div = document.createElement("div");
  div.className = "badge";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.id = "badge-" + index;

  checkbox.checked = localStorage.getItem("badge-" + index) === "true";

  checkbox.addEventListener("change", () => {
    localStorage.setItem("badge-" + index, checkbox.checked);
    updateProgress();
  });

  const label = document.createElement("label");
  label.htmlFor = checkbox.id;
  label.textContent = " " + badge;

  div.appendChild(checkbox);
  div.appendChild(label);
  container.appendChild(div);
});

updateProgress();
</script>

</body>
</html>
