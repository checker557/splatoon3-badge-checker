input {
  padding: 8px;
  width: 200px;
}

button {
  padding: 8px 12px;
  margin-left: 5px;

}

.badge {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
}

.badge:hover {
  transform: scale(1.02);
}

.badge.locked {
  opacity: 0.5;
  filter: grayscale(100%);
}

.badge-title {
  font-weight: bold;
}

.badge-condition {
  font-size: 13px;
  color: #666;
}

.hidden {
  display: none;
}

let showUnobtainedOnly = false;

function render() {
  container.innerHTML = "";
  const lines = badgeData.split("\n");
  let currentCategory = null;

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    if (!line.includes("　")) {
      const h2 = document.createElement("h2");
      h2.textContent = line;
      container.appendChild(h2);
    } else {
      const [name, condition] = line.split("　");
      const badge = document.createElement("div");
      badge.className = "badge";

      if (!saved[name]) badge.classList.add("locked");

      badge.innerHTML = `
        <div class="badge-title">${name}</div>
        <div class="badge-condition">${condition}</div>
      `;

      badge.onclick = () => {
        saved[name] = !saved[name];
        localStorage.setItem("badges", JSON.stringify(saved));
        render();
      };

      if (showUnobtainedOnly && saved[name]) {
        badge.classList.add("hidden");
      }

      container.appendChild(badge);
    }
  });
}

function toggleUnobtained() {
  showUnobtainedOnly = !showUnobtainedOnly;
  render();
}

document.getElementById("search").addEventListener("input", function() {
  const word = this.value.toLowerCase();
  document.querySelectorAll(".badge").forEach(b => {
    b.classList.toggle("hidden",
      !b.textContent.toLowerCase().includes(word)
    );
  });
});

render();
</script>

</body>
</html>
