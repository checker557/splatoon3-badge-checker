<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バッジチェッカー</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-top: 30px;
}

.controls {
  margin-bottom: 20px;
}

input {
  padding: 8px;
  width: 200px;
}

button {
  padding: 8px 12px;
  margin-left: 5px;
  cursor: pointer;
}

.badge {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
}

.badge:hover {
  transform: scale(1.02);
}

.badge.locked {
  opacity: 0.5;
  filter: grayscale(100%);
}

.badge-title {
  font-weight: bold;
}

.badge-condition {
  font-size: 13px;
  color: #666;
}

.hidden {
  display: none;
}
</style>
</head>
<body>

<h1>バッジチェッカー</h1>

<div class="controls">
  <input type="text" id="search" placeholder="検索">
  <button onclick="toggleUnobtained()">未取得のみ</button>
</div>

<div id="container"></div>

<script>
const badgeData = `
ショップバッジ
ブキチバッジ（ノーマル）　10コのブキのじゅくれん度が★４以上になった
ブキチバッジ（銀）　25コのブキのじゅくれん度が★４以上になった
ブキチバッジ（金）　50コのブキのじゅくれん度が★４以上になった
エチゼン　ハイカラシティのフク屋でおカネを100,000ゲソ使った
エチゼン(金)　ハイカラシティのフク屋でおカネを1,000,000ゲソ使った
アネモ　ハイカラシティのアタマ屋でおカネを100,000ゲソ使った
アネモ(金)　ハイカラシティのアタマ屋でおカネを1,000,000ゲソ使った
アジオ　ハイカラシティのクツ屋でおカネを100,000ゲソ使った
アジオ(金)　ハイカラシティのクツ屋でおカネを1,000,000ゲソ使った
ビゼン　ハイカラスクエアのフク屋でおカネを100,000ゲソ使った
ビゼン(金)　ハイカラスクエアのフク屋でおカネを1,000,000ゲソ使った
ミウラ　ハイカラスクエアのアタマ屋でおカネを100,000ゲソ使った
ミウラ(金)　ハイカラスクエアのアタマ屋でおカネを1,000,000ゲソ使った
シガニー　ハイカラスクエアのクツ屋でおカネを100,000ゲソ使った
シガニー(金)　ハイカラスクエアのクツ屋でおカネを1,000,000ゲソ使った
オームラ　バンカラ街のアタマ屋でお金を100,000ゲソ使った
オームラ(金)　バンカラ街のアタマ屋でお金を1,000,000ゲソ使った
ハナガサ　バンカラ街のフク屋でお金を100,000ゲソ使った
ハナガサ(金)　バンカラ街のフク屋でお金を1,000,000ゲソ使った
ヤシガニさん　バンカラ街のクツ屋でお金を100,000ゲソ使った
ヤシガニさん(金)　バンカラ街のクツ屋でお金を1,000,000ゲソ使った
パル子　ザッカ屋でおカネを100,000ゲソ使った
パル子(金)　ザッカ屋でおカネを1,000,000ゲソ使った
スパイキー　スパイキーに10回ギアを注文した
スパイキー(金)　スパイキーに100回ギアを注文した
ダウニー　ダウニーに10回ギアを注文した
ダウニー(金)　ダウニーに100回ギアを注文した
店員　売店で10回注文した
店員(銀)　売店で100回注文した
店員(金)　売店で1000回注文した
`;

const container = document.getElementById("container");
const saved = JSON.parse(localStorage.getItem("badges") || "{}");
let showUnobtainedOnly = false;

function render() {
  container.innerHTML = "";
  const lines = badgeData.split("\n");
  let currentCategory = null;

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    if (!line.includes("　")) {
      const h2 = document.createElement("h2");
      h2.textContent = line;
      container.appendChild(h2);
    } else {
      const [name, condition] = line.split("　");
      const badge = document.createElement("div");
      badge.className = "badge";

      if (!saved[name]) badge.classList.add("locked");

      badge.innerHTML = `
        <div class="badge-title">${name}</div>
        <div class="badge-condition">${condition}</div>
      `;

      badge.onclick = () => {
        saved[name] = !saved[name];
        localStorage.setItem("badges", JSON.stringify(saved));
        render();
      };

      if (showUnobtainedOnly && saved[name]) {
        badge.classList.add("hidden");
      }

      container.appendChild(badge);
    }
  });
}

function toggleUnobtained() {
  showUnobtainedOnly = !showUnobtainedOnly;
  render();
}

document.getElementById("search").addEventListener("input", function() {
  const word = this.value.toLowerCase();
  document.querySelectorAll(".badge").forEach(b => {
    b.classList.toggle("hidden",
      !b.textContent.toLowerCase().includes(word)
    );
  });
});

render();
</script>

</body>
</html>
